name: Deploy presentation → Cloudflare Pages

on:
  push:
    branches: [main]
    paths: ["presentation/**", ".github/workflows/deploy-presentation.yml"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Pages project exists
        run: npx wrangler pages project create sleepmodepm-deck --production-branch=main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy presentation/ (static, no build)
        run: npx wrangler pages deploy presentation --project-name=sleepmodepm-deck --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
